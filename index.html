<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メディアアプリ（IndexedDB版）</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* ハンバーガー */
.menu-btn {
    position: fixed; top:15px; left:15px; width:30px; cursor:pointer;
}
.menu-btn span {
    display:block; height:4px; background:#333; margin:5px 0;
}

/* サイドバー */
.sidebar {
    position: fixed; top:0; left:-260px;
    width:260px; height:100%;
    background:#111; color:white;
    transition:.3s; padding-top:80px;
}
.sidebar.active { left:0; }
.menu-item { padding:18px; border-bottom:1px solid #333; cursor:pointer; }

/* コンテンツ */
.content { padding:80px 20px; }
.section { display:none; }
.section.active { display:block; }

/* カード */
.media-box {
    max-width:600px; margin:20px auto;
    background:white; padding:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.media-box h3 { margin-bottom:10px; }

iframe { width:100%; height:315px; }
audio { width:100%; }

/* 入力 */
.input-area {
    max-width:600px; margin:10px auto;
    display:flex; gap:10px; flex-wrap:wrap;
}
input[type="text"] { flex:1; padding:10px; }
button { padding:8px; cursor:pointer; }

/* 操作 */
.actions {
    margin-top:10px;
    display:flex;
    gap:10px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>

<div class="sidebar" id="sidebar">
    <div class="menu-item" onclick="showSection('video')">動画</div>
    <div class="menu-item" onclick="showSection('audio')">音声</div>
</div>

<div class="content">

<!-- 動画 -->
<div id="video" class="section active">
    <div class="input-area">
        <input id="videoTitle" placeholder="タイトル">
        <input id="videoUrl" placeholder="YouTube URL">
        <button onclick="addVideo()">追加</button>
    </div>
    <div id="videoList"></div>
</div>

<!-- 音声 -->
<div id="audio" class="section">
    <div class="input-area">
        <input id="audioTitle" placeholder="タイトル">
        <input type="file" id="audioFile" accept="audio/*">
        <button onclick="addAudio()">追加</button>
    </div>
    <div id="audioList"></div>
</div>

</div>

<script>
/* =======================
   IndexedDB設定
======================= */
let db;
const request = indexedDB.open("MediaAppDB", 1);

request.onupgradeneeded = e => {
    db = e.target.result;

    if (!db.objectStoreNames.contains("videos")) {
        db.createObjectStore("videos", { keyPath: "id", autoIncrement: true });
    }
    if (!db.objectStoreNames.contains("audios")) {
        db.createObjectStore("audios", { keyPath: "id", autoIncrement: true });
    }
};

request.onsuccess = e => {
    db = e.target.result;
    render();
};

/* =======================
   UI操作
======================= */
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}
function showSection(type) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(type).classList.add("active");
    document.getElementById("sidebar").classList.remove("active");
}

/* =======================
   動画（IndexedDB保存）
======================= */
function addVideo() {
    const title = document.getElementById("videoTitle").value || "無題";
    const url = document.getElementById("videoUrl").value;

    const tx = db.transaction("videos", "readwrite");
    const store = tx.objectStore("videos");

    store.add({ title, url });
    tx.oncomplete = render;
}

/* =======================
   音声（ファイル保存）
======================= */
function addAudio() {
    const title = document.getElementById("audioTitle").value || "無題";
    const file = document.getElementById("audioFile").files[0];
    if (!file) return alert("ファイル選択して");

    const tx = db.transaction("audios", "readwrite");
    const store = tx.objectStore("audios");

    store.add({ title, file });
    tx.oncomplete = render;
}

/* =======================
   削除
======================= */
function deleteItem(type, id) {
    const tx = db.transaction(type, "readwrite");
    const store = tx.objectStore(type);

    store.delete(id);
    tx.oncomplete = render;
}

/* =======================
   編集
======================= */
function editItem(type, data) {
    const newTitle = prompt("タイトル変更", data.title);
    if (newTitle !== null) data.title = newTitle;

    if (type === "videos") {
        const newUrl = prompt("URL変更", data.url);
        if (newUrl !== null) data.url = newUrl;
    }

    const tx = db.transaction(type, "readwrite");
    const store = tx.objectStore(type);

    store.put(data);
    tx.oncomplete = render;
}

/* =======================
   描画
======================= */
function render() {
    renderVideos();
    renderAudios();
}

function renderVideos() {
    const list = document.getElementById("videoList");
    list.innerHTML = "";

    const tx = db.transaction("videos", "readonly");
    const store = tx.objectStore("videos");

    store.openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
            const v = cursor.value;
            const id = extractYouTubeID(v.url);
            if (!id) return cursor.continue();

            const box = createBox(v.title, "videos", v);

            const iframe = document.createElement("iframe");
            iframe.src = `https://www.youtube.com/embed/${id}`;

            box.insertBefore(iframe, box.querySelector(".actions"));
            list.appendChild(box);

            cursor.continue();
        }
    };
}

function renderAudios() {
    const list = document.getElementById("audioList");
    list.innerHTML = "";

    const tx = db.transaction("audios", "readonly");
    const store = tx.objectStore("audios");

    store.openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
            const a = cursor.value;

            const box = createBox(a.title, "audios", a);

            const audio = document.createElement("audio");
            audio.controls = true;
            audio.src = URL.createObjectURL(a.file);

            box.insertBefore(audio, box.querySelector(".actions"));
            list.appendChild(box);

            cursor.continue();
        }
    };
}

/* 共通カード */
function createBox(title, type, data) {
    const box = document.createElement("div");
    box.className = "media-box";

    const h3 = document.createElement("h3");
    h3.textContent = title;

    const actions = document.createElement("div");
    actions.className = "actions";

    const editBtn = document.createElement("button");
    editBtn.textContent = "編集";
    editBtn.onclick = () => editItem(type, data);

    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.onclick = () => deleteItem(type, data.id);

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    box.appendChild(h3);
    box.appendChild(actions);

    return box;
}

/* YouTube ID取得 */
function extractYouTubeID(url) {
    const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
    const m = url.match(reg);
    return m ? m[1] : null;
}
</script>

</body>
</html>
